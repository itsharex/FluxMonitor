<!DOCTYPE html>
<html>
<head>
<style>
.carousel-container {
    width: 500px;
    overflow: hidden;
    border: 1px solid black;
}
.carousel-track {
    display: flex;
}
.carousel-slide {
    min-width: 100%;
}
</style>
</head>
<body>
<div class="carousel-container">
    <div class="carousel-track" id="track">
        <div class="carousel-slide" style="background: red;">Slide 1</div>
        <div class="carousel-slide" style="background: blue;">Slide 2</div>
    </div>
</div>
<script>
    const track = document.getElementById('track');
    console.log("Track width:", track.offsetWidth);
    console.log("Slide width:", track.children[0].offsetWidth);
</script>
</body>
</html>
