			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Sync Node, Flux Monitor Standalone and Config into Bundle\n# This script is designed to fail gracefully if built outside of full bundle context\nDEST=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources\"\nSRC_ROOT=\"${PROJECT_DIR}/..\"\n\nif [ -d \"${SRC_ROOT}/.next/standalone\" ]; then\n  echo \"Syncing Flux Monitor Standalone resources...\"\n  mkdir -p \"${DEST}\"\n  \n  # Skip bundling node by default to save space (200MB+)\n  # NODE_BIN=$(which node || echo \"/usr/local/bin/node\")\n  # cp \"$NODE_BIN\" \"${DEST}/node\" || true\n  \n  # Sign the node binary for Hardened Runtime ONLY if it exists\n  if [ -f \"${DEST}/node\" ] && [ ! -z \"${EXPANDED_CODE_SIGN_IDENTITY}\" ]; then\n    codesign --force --options runtime --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" --timestamp --entitlements \"${SRC_ROOT}/launcher/FluxMonitor/App.entitlements\" \"${DEST}/node\" || true\n  fi\n\n  cp \"${SRC_ROOT}/.next/standalone/server.js\" \"${DEST}/server.js\" || true\n\n  # Always ensure static and public are synced to standalone first\n  mkdir -p \"${SRC_ROOT}/.next/standalone/.next/static\"\n  cp -R \"${SRC_ROOT}/.next/static/.\" \"${SRC_ROOT}/.next/standalone/.next/static/\" || true\n  mkdir -p \"${SRC_ROOT}/.next/standalone/public\"\n  cp -R \"${SRC_ROOT}/public/.\" \"${SRC_ROOT}/.next/standalone/public/\" || true\n\n  # Sync folders to destination app bundle\n  rm -rf \"${DEST}/node_modules\" && cp -R \"${SRC_ROOT}/.next/standalone/node_modules\" \"${DEST}/node_modules\" || true\n  rm -rf \"${DEST}/.next\" && cp -R \"${SRC_ROOT}/.next/standalone/.next\" \"${DEST}/.next\" || true\n  rm -rf \"${DEST}/public\" && cp -R \"${SRC_ROOT}/.next/standalone/public\" \"${DEST}/public\" || true\n  cp \"${SRC_ROOT}/config.json\" \"${DEST}/config.json\" || true\nfi\n";
		};
